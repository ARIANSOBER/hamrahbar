<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ثبت‌نام | همراه بار</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="header">
  <div class="container header-content">

    <a href="index.html" class="logo">
      <span class="logo-icon">🚛</span>
      <span class="logo-text">همراه بار</span>
    </a>

    <nav class="navbar">
      <ul>
        <li><a href="index.html" class="active">خانه</a></li>
        <li><a href="index.html#services">خدمات</a></li>
        <li><a href="drivers.html">رانندگان</a></li>
        <li><a href="owners.html">صاحبان بار</a></li>
        <li><a href="about.html">درباره ما</a></li>
        <li><a href="rules.html">قوانین</a></li>
        <li><a href="index.html#contact">تماس</a></li>
      </ul>
    </nav>

    <div class="header-actions">
      <a href="#" class="btn btn-outline">ورود</a>
      <a href="#" class="btn btn-primary">ثبت‌نام</a>
    </div>

  </div>
</header>

<section class="register-page">

  <div class="container">

    <div class="register-wrapper">

      <div class="register-header">
        <span class="register-badge">عضویت در سامانه</span>

        <h1>
          شروع همکاری با
          <span>همراه بار</span>
        </h1>

        <p>
          اطلاعات خود را تکمیل کنید و به شبکه هوشمند حمل‌ونقل کشور بپیوندید.
        </p>
      </div>

      <form class="register-form" id="registerForm">

        <div class="form-group">
          <label>نوع حساب</label>

          <div class="role-options">

            <label class="role-option">
              <input type="radio" name="role" checked>
              <span class="role-card">
                <span class="role-icon">📦</span>
                <span class="role-name">صاحب بار</span>
              </span>
            </label>

            <label class="role-option">
              <input type="radio" name="role">
              <span class="role-card">
                <span class="role-icon">🚛</span>
                <span class="role-name">راننده</span>
              </span>
            </label>

          </div>
        </div>

        <div class="form-group">
          <label>نام و نام خانوادگی</label>
          <input type="text" placeholder="مثال: علی محمدی">
        </div>

        <div class="form-group">
          <label>شماره موبایل</label>
          <input type="tel" placeholder="09xxxxxxxxx">
        </div>

        <div class="form-group">
          <label>ایمیل</label>
          <input type="email" placeholder="name@example.com">
        </div>

        <div class="form-group">
          <label>نام شرکت</label>
          <input type="text" placeholder="اختیاری">
        </div>

        <div class="form-group">
          <label>جنسیت</label>

          <div class="gender-options">

            <label>
              <input type="radio" name="gender" checked>
              <span>👨 مرد</span>
            </label>

            <label>
              <input type="radio" name="gender">
              <span>👩 زن</span>
            </label>

          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full">
          ایجاد حساب کاربری
        </button>

        <p class="register-footer">
          حساب دارید؟
          <a href="#">وارد شوید</a>
        </p>

      </form>

    </div>

  </div>

</section>

<footer class="footer footer-simple">
  <div class="container">
    <div class="footer-bottom">
      © ۱۴۰۵ همراه بار
    </div>
  </div>
</footer>

<script src="assets/js/register.js"></script>

</body>
</html>
